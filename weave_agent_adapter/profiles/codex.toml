# Harness profile: OpenAI Codex CLI. See specs/HARNESS_PROFILES.md.
# Codex's hook system mirrors Claude Code's (stdin JSON, tool_use_id correlation),
# so this is a profile-only integration, no code. Field paths per the Codex
# hooks docs (https://developers.openai.com/codex/hooks).
#
# Notable differences from Claude Code, handled by graceful degradation:
#   - No SessionEnd event -> sessions close via the sidecar's idle sweep.
#   - No PermissionDenied event -> a denied tool (hook exit 2) simply has no
#     PostToolUse; it closes via the sweep rather than as an explicit rejection.
#   - Emits SubagentStart in practice (Claude Code documents it but doesn't emit
#     it in 2.1.201), so subagent records open at start rather than being
#     materialized from their first interior tool.

[harness]
name    = "codex"

[events]
SessionStart      = "session_start"
UserPromptSubmit  = "turn_start"
PreToolUse        = "tool_pre"
PostToolUse       = "tool_post"
PermissionRequest = "permission_request"
SubagentStart     = "subagent_start"
SubagentStop      = "subagent_stop"
PreCompact        = "compaction"
Stop              = "turn_end"

[fields]
session_id         = "session_id"
tool_name          = "tool_name"
tool_input         = "tool_input"
tool_output        = "tool_response"
tool_use_id        = "tool_use_id"
cwd                = "cwd"
model              = "model"
permission_mode    = "permission_mode"
turn_id            = "turn_id"
prompt             = "prompt"               # UserPromptSubmit (provisional)
assistant_message  = "last_assistant_message"   # Stop (the turn's final reply)
transcript         = "transcript_path"
agent_id           = "agent_id"
agent_type         = "agent_type"
compaction_trigger = "trigger"              # PreCompact (provisional)

[enrich]
source = "codex-transcript"                  # assistant text, reasoning summaries, usage

[registration]
user_path  = "~/.codex/hooks.json"           # install (default scope)
local_path = ".codex/hooks.json"             # install --local
command    = "weave-agent-adapter hook --harness codex"   # installer appends --event <event>
post_install = "Codex skips new or changed non-managed hooks until trusted; review and trust them with /hooks."
events  = [
  "SessionStart", "UserPromptSubmit", "PreToolUse", "PermissionRequest",
  "PostToolUse", "SubagentStart", "SubagentStop", "PreCompact", "Stop",
]
