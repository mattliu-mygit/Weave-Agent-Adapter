# Example weave-agent-adapter config — read by the sidecar (env > this file > defaults).
# Copy to ~/.weave-agent-adapter/config.toml and edit. The hook needs no config.

active_harness = "claude-code"        # -> profiles/<name>.toml

[weave]
entity  = "your-entity"
project = "claude-code"
# WANDB_API_KEY is read from the environment — never put secrets in this file.
enable_wal = true                      # crash-safe queued sends (WEAVE_ENABLE_WAL)

[redaction]
enabled     = true                     # scrub secrets before sending (default true)
redact_keys = ["api_key", "authorization", "token", "password"]  # extra deny keys; omit for defaults

[sampling]
session_rate = 1.0                     # fraction of sessions traced (root-only)

[trace]
granularity = "session"                # "session" = one trace per session; or "turn"

[sidecar]
idle_shutdown_s = 120                  # exit after this long with no active sessions
