name: publish

on:
  push:
    tags: ["v*"]

# Publishes to PyPI via trusted publishing (OIDC), no API token is stored.
# One-time setup on PyPI (pypi.org -> Account/Project -> Publishing -> add a
# GitHub publisher). For the FIRST release use a "pending publisher":
#   PyPI project name: weave-agent-adapter
#   Owner:  mattliu-mygit
#   Repo:   Weave-Agent-Adapter
#   Workflow: publish.yml
#   Environment: pypi
# Then release with:  git tag v0.1.0 && git push origin v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
